name: Build patched Shockolate aarch64

on:
  workflow_dispatch:
  push:
    paths:
      - ".github/workflows/build-aarch64.yml"
      - "Dockerfile"
      - "sources.list"
      - "shockolate-*.patch"

permissions:
  contents: read

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - name: Checkout build files
        uses: actions/checkout@v4

      - name: Enable ARM64 emulation
        uses: docker/setup-qemu-action@v3
        with:
          platforms: arm64

      - name: Enable Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Shockolate for ARM64
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/arm64
          outputs: type=local,dest=out
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Inspect binary
        run: |
          file out/sshock.aarch64
          sha256sum out/sshock.aarch64 | tee out/sshock.aarch64.sha256

      - name: Upload PortMaster binary
        uses: actions/upload-artifact@v4
        with:
          name: sshock-aarch64-patched
          path: |
            out/sshock.aarch64
            out/sshock.aarch64.sha256
          if-no-files-found: error

